services:
  - type: web
    name: expplanobras-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: |
      set -e
      npm ci --include=dev --ignore-scripts
      npm run prisma:generate
      cd prisma/postgres && npx prisma migrate deploy --schema=./schema.prisma && cd ../..
      tsx scripts/create-system-admin.ts
      npm run build
    startCommand: |
      node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

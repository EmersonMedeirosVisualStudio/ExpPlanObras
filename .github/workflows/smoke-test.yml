name: Smoke Test
on:
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * *'
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run smoke test
        run: node scripts/smoke-test.mjs
        env:
          API_BASE_URL: ${{ secrets.SMOKE_API_BASE_URL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
